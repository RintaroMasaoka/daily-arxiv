name: Post to Slack

on:
  push:
    branches:
      - main
    paths:
      - "output/result.md"

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Read result and post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ ! -f output/result.md ]; then
            echo "output/result.md not found"
            exit 0
          fi

          CONTENT=$(cat output/result.md)
          if [ -z "$CONTENT" ]; then
            echo "result.md is empty"
            exit 0
          fi

          PAYLOAD=$(python3 -c "
import json, sys
text = sys.stdin.read()
payload = {
    'blocks': [{
        'type': 'section',
        'text': {'type': 'mrkdwn', 'text': text}
    }]
}
print(json.dumps(payload))
" < output/result.md)

          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            --fail --silent --show-error
